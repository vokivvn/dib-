l_english:
 ENG_bells_ring: "Bells Ring"
 ENG_bells_ring_desc: "The road to the current year has been a long one. Our role as God’s chosen people has drawn the ire and opposition of nations the world over and subversion threatens to upset the sacred order that generations have spent constructing. And yet we persevere. To act as agents of God was never going to be an easy task, and even as the tides of earthly wickedness beat against the sides of our blessed land we must continue on course. The bells ring across Ephraim. For a new year, for an eternal empire."
 ENG_the_king_speaks: "The King Speaks"
 ENG_the_king_speaks_desc: "If there’s a steadfast ally we can rely on, it's the king. Charles the Third, by the Grace of God of the United Kingdom of Ephraim and Israel and of His other Realms and Territories, King, Head of the Commonwealth, Supreme Commander of the Church of England, Defender of the Faith. Since the day he came of age to assume the throne he proven to be a persistent supporter of our ways. With the review of his Christmas Message last year by experts at the ESIS finding no signs of dissident signaling we are confident that his role as a symbol of the empire shall remain. In an attempt to assuage public discontent it’s been decided that he will join Campbell in delivering a New Year’s Message to the people."
 ENG_and_ephraim_marches_on: "And Ephraim Marches On!"
 ENG_and_ephraim_marches_on_desc: "We have reflected enough on our past and now must turn towards addressing the current situation. Factionalism besets the party which in turn weakens our grip over the government. Discontents of all stripes, fermenting in their dens across every city in the union, seek to exploit our momentary weakness. The time has come to point the finger at these villains and drag them out of the shadows. Additionally we must move swiftly to address concerns within Parliament, lest we allow our foes a moment to strike…"
 ENG_ruffled_feathers: "Ruffled Feathers"
 ENG_ruffled_feathers_desc: "Despite our best attempts to mitigate the fall out of our shortcomings overseas and combat the surging opposition on our streets, it would seem that even our most loyal supporters in Parliament are starting to grow antsy over the current state of things. Some have strayed into other factions within the party while fewer still make contact with forces outside of it. If this continues we’ll find our support base has eroded beneath our feet!"
 ENG_address_parliament: "Address Parliament"
 ENG_address_parliament_desc: "As our efforts to weed out the snakes slithering in the shadows drag on it’s becoming inevitable that we address the MPs to reassure them. Campbell always enjoys a bit of brimstone preaching; he just needs to make sure his audience doesn’t get any ideas about their place in things."
 ENG_reassure_party_whips: "Reassure Party Whips"
 ENG_reassure_party_whips_desc: "Though Campbell’s address was largely successful at calming the nerves of most the members of Parliament it failed at satisfying one crucial group–the party whips. By and large they’re still prattling amongst themselves about the possibility of a full-scale revolt in the near future, worrying their heads will be mounted on the gates outside Westminster any day now. O ye of little faith, a more private conference will be needed to reassure these worried souls who holds the reins of state."
 ENG_the_10_plagues: "The 10 Plagues"
 ENG_the_10_plagues_desc: "Millennia ago the Lord set ten plagues upon the land of Egypt to secure the freedom of the Israelites. Now, it seems that even God’s chosen people are at the mercy of a catastrophic upheaval. Over the last few months throngs of people have gathered from across every corner of London and beyond. Their message rings loud and clear: Open and fair elections now. Such rubbish would be tolerated as a passing trend that would die down after a week or two. Yet the exact opposite has occurred. Protests have not only persisted but have multiplied in size and frequency. No doubt fueled by anti-government groups, we must identify who the key players are before making our next move."
 ENG_ungodly_heretics: "Ungodly Heretics"
 ENG_ungodly_heretics_desc: "It comes as no surprise that many of those scheming against us are an assorted bunch of heretics and devil worshippers! Papists, Jewish dissenters, atheists, and satanists all vying to see who could be the one to bite us in the ankle. We know who they are now though, and before long we’ll track them down to whatever wretched hole they’re hiding in, and smite them in the name of God."
 ENG_making_dossiers: "Making Dossiers"
 ENG_making_dossiers_desc: "Ever since the order came down from the Prime Minister’s desk the ESIS has been running through its usual network of informants and targeting people of interest for questioning. Though it took a few weeks and several hours of specialized interrogation, our top analysts have compiled all the information gathered into a set of dossiers outlining who and what we are up against."
 ENG_our_next_step: "Our Next Step"
 ENG_our_next_step_desc: "Protesters grow bolder with each passing day, with some of the most recent demonstrations escalating into riots. And although the party has been reconsolidated somewhat, factions continue to push their own agendas amidst the intensifying discord. Anti-government groups will continue to spread bedlam and exploit the disorder that follows for their own gain. The people’s demands cannot be brushed aside, for the sake of our Holy Kingdom a decision must be made and it must be made soon."
 ENG_ready_the_esis: "Ready the ESIS"
 ENG_ready_the_esis_desc: "Time has run out, we act now or London’s streets will flow red before the end of the week. No matter what orders are being sent out like clockwork to the ESIS to prepare for whatever comes next. God has saved Ephraim once, let us hope that His Providence will guide Ephraim towards a prosperous future."
 ENG_righteous_authority: "Righteous Authority"
 ENG_righteous_authority_desc: "Up until now we’ve been playing the game according to our opponent’s rules–no longer. We’ll announce snap elections for some day soon, the date does not matter so long as it’s there. The protests will die down, their leaders preparing for the day when they’ll have a chance to snatch power away from us. It’ll be nothing more than a carrot on a stick, and when they finally realize the ruse it will be far too late.There are moments where a degree of subterfuge and deception must be employed to soothe flaring tempers and allow righteous thinking to prevail."
 ENG_loosen_the_leash: "Loosen the Leash"
 ENG_loosen_the_leash_desc: "A great deal of time and effort has been exerted towards suppressing the people’s demand for a voice in the government. Under Campbell we have lost valuable party loyalties and permitted hostile elements to ride the wave of public discontent. The only way to undermine their newfound support and restore trust in the government is to organize snap elections."
 ENG_renewing_gods_mandate: "Renewing God’s Mandate"
 ENG_renewing_gods_mandate_desc: "When the Lord instructed Abraham to go out of his father’s house and into a new land, He said that He would bless Abram and his line, promising to make a great nation out of him. When our forebears were driven out of the holy land their descendants settled across Northern and Western Europe, coalescing into the modern Anglo-Saxon race. God has guided us from the Heptarchy into an empire that spans every continent and commands power unlike any other. We became complacent in our privileged position, and paid dearly for it. Our enemies took advantage of our momentary weakness–but never again. Remembering the promise which God made to Abraham so long ago, we will reassert our proper position in the world and drive all the mongrels into the sea."
 ENG_step_aside: "Step Aside"
 ENG_step_aside_desc: "One would struggle to find a man as devoted to our cause as Joseph Alan Campbell, the Ulsterman’s near slavish loyalty and commitment to the cause has been commendable. That being said, he cannot be relied upon to act as our candidate in the upcoming election. He’s far too divisive and acts as a reminder of the traditional clerical elite. To ensure we have a chance he will have to be passed over for candidacy."
 ENG_choosing_our_candidates: "Choosing our Candidate"
 ENG_choosing_our_candidates_desc: "Perhaps the only upside to the factionalism that’s divided the Conservative party for the better half of a decade, is that it’s allowed for the emergence of a handful of notable figures ready to step into the limelight. Though none of them resemble hardline clergymen like Campbell and his predecessors, they nonetheless are willing to act within expected boundaries and uphold Anglican teachings, or at least, an interpretation of it. A comedian, a traditionalist, a livestock farmer, a reformer, and a blue Labourite. Senior MPs and party representatives will meet to decide which of these men will act as the new face of the Tories for the foreseeable future."
 ENG_open_the_polls: "Open the Polls..."
 ENG_open_the_polls_desc: "The day has arrived. In just a few hours the polls will open and votes will be cast from London to Edinburgh and across the sea in Dublin. What comes next is wholly outside of our control and though we could tamper with the final count that will only do so much to change the final outcome. We can only wait and pray the people of Ephraim can come to a sensible decision…"
 ENG_winds_of_change: "Winds of Change?"
 ENG_winds_of_change_desc: "The electoral results have arrived and our worst expectations have come to pass. By a significant margin one of the opposition candidates managed to secure a substantial plurality. Though it hasn’t pushed us out of power entirely it will hinder our ability to influence the direction of the nation going forward. The new government will be fresh but also unaccustomed to governing, which could make them especially susceptible to a crisis should one come to pass."
 ENG_stale_water: "Stale Water?"
 ENG_stale_water_desc: "For a moment the fate of our nation rested in the vulnerable hands of its citizens. It seemed almost certain that they would turn against us, tempted by the radicalism of the opposition into tearing down the foundations of the holy kingdom. Yet it would seem we placed too little faith in the convictions of the common people. In a surprising turn of events they have voted to remain with the Conservatives, several no doubt swayed by the change in face. Change will come, but fully within the purview of the old order. Ephraim has endured the worst for now, and can look towards a renewed future."
 ENG_Knights_of_old_ephraim: "Knights of Old Ephraim"
 ENG_Knights_of_old_ephraim_desc: "For Ephraim to continue on it must look towards its past. Gregory Lauder-Frost and his stalwart Traditionalists recognize the necessity of returning to the time-honored values and systems which enabled our holy kingdom to reign ascendant for centuries. Humble and obedient peasant guarded by a refined, pious noble class. Rather than bothering with absurd notions of disruptive egalitarianism there would be a shared agreement on the natural order of society. Harkening back to those splendid days will surely allow us to recapture the spirit and glory of old Ephraim."
 ENG_back_to_the_land: "Back to the Land"
 ENG_back_to_the_land_desc: "A nation ceases to be when its land and its people are compromised beyond repair. A rampant focus on urbanisation and the careless importation of foreigners facilitated the emergence of modern Ephraim. Cities become hubs for any and all assortment of filth. The air becomes choked with fumes and smog while disease and vice fester in immigrant-riddled apartment blocks. This is not what Ephraim is. Clear streams flowing into verdant groves through the shade of trees whose history goes back to even the earliest Britons. A light-eyed farmer toiling the land with his home not too far from the fields he works, his dutiful wife caring for the children. That is what Ephraim is, according to Allen Savory, and what it shall remain."
 ENG_dont_stop_me_now: "Don’t Stop Me Now!"
 ENG_dont_stop_me_now_desc: "People are looking for something new, something fresh to liven the place up. Out with the tired old programming and in with someone who’s really going to liven things up. Enter Kenny Everett, stepping in to freshen up the government. Politicians can be such bores, but dear old Kenny is determined to break that perception, and free up the markets so any Ephraimite can start making an honest living without having to deal with government meddling in their coin purses."
 ENG_delicate_balance: "Delicate Balance"
 ENG_delicate_balance_desc: "There is something innately tragic to the magic of statecraft. In and amongst the backroom dealing, bitter argumentation, and party infighting it becomes easy to lose sight of who is really suffering. The working class who maintain and uphold the very foundations of society fade into the background while the government pushes legislation favoring the interests of the moneyed class and cheap labour abroad. Only one man has emerged willing to champion the cause of the worker, Maurice Glassman. Forging an alliance between sectors of Labour and the Tories, maintaining this fragile political union might hinder his ability to achieve his aims of safeguarding the working class."
 ENG_let_it_be: "Let It Be"
 ENG_let_it_be_desc: "For centuries British Israelism has been constructed to be an inherently exclusionary belief system. By right of blood the Anglo-Saxon race are the inheritors of Jacob’s blessing, marking them as superior to the ‘mud races’ which they would conquer. Yet, if God’s message is meant to be universal, then why shouldn’t His blessing be either? A small but growing cluster of reformers have put forward the notion that to be an Israelite should have less to do with race and more so with an acclimation to certain norms and ideals which have originated from the British Isles. They seemed doomed to be dismissed by the wider party, until they found a champion in the former Beatle, Paul McCartney. With him at the forefront, the reformers have managed to secure the party leadership, and the office of prime minister. Only time will tell if their vision can bear any fruit."
 ENG_onwards: "Onwards!"
 ENG_onwards_desc: "There have been plenty of cases where businessmen have entered the political arena to great success, but few could compare to Clive Sinclair. A self-made man? Certainly, but also an inventor and innovator in the field of electronics. It would be assumed that he would fall into the stereotype of the introverted genius, but far from it. With a sizable wealth at his disposal and a platform that stresses both technological and social advancement within a liberal democracy, it seems almost antithetical to the archaic, fundamentalist regime that has held it’s grip over Ephraim for decades. If there ever was a man that could ease that grip however, it would be Sinclair."
 ENG_mother_of_the_free: "Ephraim, Mother of the Free"
 ENG_mother_of_the_free_desc: "Not a day goes by where some form of injustice is not carried out in Ephraim. From the bigoted harassment faced by racial and sexual minorities at home, to the abuse laid on the indigenous people in the colonies. For far too long these people and their voices have been silenced in the service of an oppressive, backwards elite whose reign has nearly driven the country into a pariah state. This march towards a new dark age will go no further. Unique among the rabbis, Julia Neuberger, has been controversial even among Jewish circles for her ardent social liberalism, denouncing discrimination, authoritarianism, and so-called repressive laws. Such rhetoric seemed to naturally exclude her from even the possibility of attaining any sort of governmental authority. However, with the recent election results it seems as though Ephraim is ready for a massive shift in direction."
 ENG_no_more_hiding: "No More Hiding"
 ENG_no_more_hiding_desc: "Repulsive is what some people would call it. Jeremy Thorpe, or “that damned sodomite,” as he was more commonly referred to across all levels of the political establishment, being elected to the office of prime minister. To the man himself it seemed like something completely out of the question just a year ago but he was hardly one to squander an opportunity. This had been a long time coming, there was no doubt that several people will be reluctant towards the new course championed by him and his compatriots. Thorpe understands, and is prepared to meet them head on. As the latest in a long line of men fighting to secure freedom and liberty for the people, he has no doubts left to trouble him."
 ENG_israel_lives: "Israel Lives!"
 ENG_israel_lives_desc: "In the cases of children with influential parents it is often observed that they are unable to match their parent’s achievements, resigned to mediocrity by comparison. Very rarely are they able to exceed them as Max Mosley has done. His father had been a prominent figure on the national political scene for close to fifty years, his name synonymous with continental-centric socialism. Having taken up the mantle of the elder Mosley shortly before his passing, Max maintained the support of his father’s old allies while securing a new clique within the National Front. Across both old and young however, is a determination to see Ephraim reshaped into a more cleanly socialist society, proudly standing alongside her Nordic brethren in a harmonious union of nations."
 ENG_national_front_disco: "National Front Disco"
 ENG_national_front_disco_desc: "A nation is not just people who happen to live arbitrarily within a defined set of lines. It’s blood, culture, and shared history which binds them together into something meaningful. The National Front recognizes that, as does its young leader, Steve Patrick Morrissey. A singer of great repute among the youth, it was his transition onto the political stage that marked him as something far more interesting. He became known as a firebrand, along with his mix of spectacle and political messaging that bordered on performance and political messaging. It was only a matter of time before the whole of Ephraim was singing his tune, and with him they’ll see that the nation remains one by the English, and for the English."