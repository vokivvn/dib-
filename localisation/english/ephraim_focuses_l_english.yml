l_english:
 ENG_bells_ring: "Bells Ring"
 ENG_bells_ring_desc: "The road to the current year has been a long one. Our role as God’s chosen people has drawn the ire and opposition of nations the world over and subversion threatens to upset the sacred order that generations have spent constructing. And yet we persevere. To act as agents of God was never going to be an easy task, and even as the tides of earthly wickedness beat against the sides of our blessed land we must continue on course. The bells ring across Ephraim. For a new year, for an eternal empire."
 ENG_the_king_speaks: "The King Speaks"
 ENG_the_king_speaks_desc: "If there’s a steadfast ally we can rely on, it's the king. Charles the Third, by the Grace of God of the United Kingdom of Ephraim and Israel and of His other Realms and Territories, King, Head of the Commonwealth, Supreme Commander of the Church of England, Defender of the Faith. Since the day he came of age to assume the throne he proven to be a persistent supporter of our ways. With the review of his Christmas Message last year by experts at the ESIS finding no signs of dissident signaling we are confident that his role as a symbol of the empire shall remain. In an attempt to assuage public discontent it’s been decided that he will join Campbell in delivering a New Year’s Message to the people."
 ENG_and_ephraim_marches_on: "And Ephraim Marches On!"
 ENG_and_ephraim_marches_on_desc: "We have reflected enough on our past and now must turn towards addressing the current situation. Factionalism besets the party which in turn weakens our grip over the government. Discontents of all stripes, fermenting in their dens across every city in the union, seek to exploit our momentary weakness. The time has come to point the finger at these villains and drag them out of the shadows. Additionally we must move swiftly to address concerns within Parliament, lest we allow our foes a moment to strike…"
 ENG_ruffled_feathers: "Ruffled Feathers"
 ENG_ruffled_feathers_desc: "Despite our best attempts to mitigate the fall out of our shortcomings overseas and combat the surging opposition on our streets, it would seem that even our most loyal supporters in Parliament are starting to grow antsy over the current state of things. Some have strayed into other factions within the party while fewer still make contact with forces outside of it. If this continues we’ll find our support base has eroded beneath our feet!"
 ENG_address_parliament: "Address Parliament"
 ENG_address_parliament_desc: "As our efforts to weed out the snakes slithering in the shadows drag on it’s becoming inevitable that we address the MPs to reassure them. Campbell always enjoys a bit of brimstone preaching; he just needs to make sure his audience doesn’t get any ideas about their place in things."
 ENG_reassure_party_whips: "Reassure Party Whips"
 ENG_reassure_party_whips_desc: "Though Campbell’s address was largely successful at calming the nerves of most the members of Parliament it failed at satisfying one crucial group–the party whips. By and large they’re still prattling amongst themselves about the possibility of a full-scale revolt in the near future, worrying their heads will be mounted on the gates outside Westminster any day now. O ye of little faith, a more private conference will be needed to reassure these worried souls who holds the reins of state."
 ENG_the_10_plagues: "The 10 Plagues"
 ENG_the_10_plagues_desc: "Millennia ago the Lord set ten plagues upon the land of Egypt to secure the freedom of the Israelites. Now, it seems that even God’s chosen people are at the mercy of a catastrophic upheaval. Over the last few months throngs of people have gathered from across every corner of London and beyond. Their message rings loud and clear: Open and fair elections now. Such rubbish would be tolerated as a passing trend that would die down after a week or two. Yet the exact opposite has occurred. Protests have not only persisted but have multiplied in size and frequency. No doubt fueled by anti-government groups, we must identify who the key players are before making our next move."
 ENG_ungodly_heretics: "Ungodly Heretics"
 ENG_ungodly_heretics_desc: "It comes as no surprise that many of those scheming against us are an assorted bunch of heretics and devil worshippers! Papists, Jewish dissenters, atheists, and satanists all vying to see who could be the one to bite us in the ankle. We know who they are now though, and before long we’ll track them down to whatever wretched hole they’re hiding in, and smite them in the name of God."
 ENG_making_dossiers: "Making Dossiers"
 ENG_making_dossiers_desc: "Ever since the order came down from the Prime Minister’s desk the ESIS has been running through its usual network of informants and targeting people of interest for questioning. Though it took a few weeks and several hours of specialized interrogation, our top analysts have compiled all the information gathered into a set of dossiers outlining who and what we are up against."
 ENG_our_next_step: "Our Next Step"
 ENG_our_next_step_desc: "Protesters grow bolder with each passing day, with some of the most recent demonstrations escalating into riots. And although the party has been reconsolidated somewhat, factions continue to push their own agendas amidst the intensifying discord. Anti-government groups will continue to spread bedlam and exploit the disorder that follows for their own gain. The people’s demands cannot be brushed aside, for the sake of our Holy Kingdom a decision must be made and it must be made soon."
 ENG_ready_the_esis: "Ready the ESIS"
 ENG_ready_the_esis_desc: "Time has run out, we act now or London’s streets will flow red before the end of the week. No matter what orders are being sent out like clockwork to the ESIS to prepare for whatever comes next. God has saved Ephraim once, let us hope that His Providence will guide Ephraim towards a prosperous future."
 ENG_righteous_authority: "Righteous Authority"
 ENG_righteous_authority_desc: "Up until now we’ve been playing the game according to our opponent’s rules–no longer. We’ll announce snap elections for some day soon, the date does not matter so long as it’s there. The protests will die down, their leaders preparing for the day when they’ll have a chance to snatch power away from us. It’ll be nothing more than a carrot on a stick, and when they finally realize the ruse it will be far too late.There are moments where a degree of subterfuge and deception must be employed to soothe flaring tempers and allow righteous thinking to prevail."
 ENG_loosen_the_leash: "Loosen the Leash"
 ENG_loosen_the_leash_desc: "A great deal of time and effort has been exerted towards suppressing the people’s demand for a voice in the government. Under Campbell we have lost valuable party loyalties and permitted hostile elements to ride the wave of public discontent. The only way to undermine their newfound support and restore trust in the government is to organize snap elections."
 ENG_renewing_gods_mandate: "Renewing God’s Mandate"
 ENG_renewing_gods_mandate_desc: "When the Lord instructed Abraham to go out of his father’s house and into a new land, He said that He would bless Abram and his line, promising to make a great nation out of him. When our forebears were driven out of the holy land their descendants settled across Northern and Western Europe, coalescing into the modern Anglo-Saxon race. God has guided us from the Heptarchy into an empire that spans every continent and commands power unlike any other. We became complacent in our privileged position, and paid dearly for it. Our enemies took advantage of our momentary weakness–but never again. Remembering the promise which God made to Abraham so long ago, we will reassert our proper position in the world and drive all the mongrels into the sea."
 ENG_step_aside: "Step Aside"
 ENG_step_aside_desc: "One would struggle to find a man as devoted to our cause as Joseph Alan Campbell, the Ulsterman’s near slavish loyalty and commitment to the cause has been commendable. That being said, he cannot be relied upon to act as our candidate in the upcoming election. He’s far too divisive and acts as a reminder of the traditional clerical elite. To ensure we have a chance he will have to be passed over for candidacy."