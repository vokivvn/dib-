 Ephraim.1.title: "The Face of The Opposition"
 Ephraim.1.desc: "There are many people in this kingdom that would see it run much differently than what the Conservative Party would want. Many opposing ideologies fight for a spot to overthrow the Conservative Party and many interesting faces to go along with these ideas. Many have a chance and some not so much. Now we must select one of these faces.\n\nFirst there is the National Front with two candidates, one of them being Steve Morrissey. The rock star seems to hold the same views as many on the conservative but his anti-immigration and isolationist stance separate him from the Establishment. The other National Front candidate is Max Mosley, son of the famous Oswald Mosley. Stemming from the "Fabian" faction of the National Front, he considers himself both a Democratic Socialist and a Nordic Israelist, making him a very complex and very racialist candidate. The Liberal Party proposes Jeremy Thorpe, an openly homosexual man. While he seems to be popular with liberals, many doubt a gay man will be able to lead or even win the election. The Liberal and Reformist Party also proposed an odd candidate; the second woman to be ordained a rabbi and, to their hopes, the First Female Prime Minister, Julia Neuberger. She proposes radical reforms and is known to be the more progressive of the leaders. Finally, in the Creative Liberty Party they proposed the Computer Entrepreneur and Inventor Clive Sinclair. While being a bit more market oriented than the other candidates, he looks far more into the future and advocates for Ephraim to modernize their technology. The question now falls onto you: How shall we choose?"
 Ephraim.1.a: "Morrissey, Migrants Out! Ephraim for the English!"
 Ephraim.1.b: "Mosley, Ephraim will March On!"
 Ephraim.1.c: "Thorpe, Nothing to Hide from anymore!"
 Ephraim.1.d: "Neuberger, Show them what a Woman can do!"
 Ephraim.1.e: "Sinclair, Forward Ephraim!"
 
 Ephraim.2.title: "The Face of the Conservative"
 Ephraim.2.desc: "The day has come that we must select a representative of the Conservative Party that will serve the interests of Ephraim and her people. Ever since we've implemented our candidate into the Party we've had such a steady growth of different viewpoints in how to take this nation.\n\nOn the one hand you have the traditionalists who's strict code of belief in going back to a good old days to the racialists in the One Nation side. They wish to implement more strict racial laws to ensure the state remains of the pure true lost tribe of Israel. The Free Marketers appear to be more lax, all though some of our agencies have suspicions of their leader Kenny Everette. The Labor-Conservatives seek to ally with the more economically left in their policy and appear to be the most cooperative with others second only to the Reformist faction under McCartney. Your decision now is who to choose…"
 Ephraim.2.a: "Gregory Lauden-Frost, Ephraim needs to go back to traditional values that it is based on!"
 Ephraim.2.b: "Allen Savoy, Ephraim and its tribe is one race, one nation!"
 Ephraim.2.c: "Kenney Everette, The Invisible Hand shall guide this Tribe."
 Ephraim.2.d: "Maurice Glasman, a Labor government to care both for its people and its tradition."
 Ephraim.2.e: "Paul McCartney's Reform and Freedom for our Lost Tribe."
 
 Ephraim.3.title: "Knights of Old Ephraim"
 Ephraim.3.desc: "As a child one often hears stories about chivalrous knights triumphing over a great evil through their bravery and devotion to their code. While simple children's tales, they descend from the far older tradition of chivalric romance which sought to exemplify virtues through the exploits and lives of legendary knights. Despite these respectable origins, many go on to believe that this ideal is nothing more than an archaic holdover from romantic retellings of a past which never existed. Such line of thinking is a product of centuries of erosion at the hands of malicious forces looking to tear down the time-honored traditions once held dearly by our people.\n\nThese are the musings of Gregory Lauder-Frost as he sat by the fireplace, nursing his scotch and contemplating the momentous occasion at hand. The last few days had been spent dining, hunting, and socializing with the most venerable members of Ephraim's aristocracy. Though great fun he required a night to himself to savour his victory, and consider the future. He could not help but smile as he raised his glass to his lips. There was much that needed to be done in order to realize-no-revive, the nearly-abandoned past which had been lost to all but those whose families kept the memory alive. Honor, duty, natural law, and an organic order would return to Ephraim before long. Gregor Lauder-Frost rose and moved to the window that overlooked the moonlit hills outside. It had taken generations of safeguarding, but the old order was ready to reassert its prerogative. Ephraim would have a knight to save it from itself."
 Ephraim.3.a: "A Return to the Aristocratic Ideal"
 
 Ephraim.4.title: "In the Green Meadows"
 Ephraim.4.desc: "In the Green Pastures of North England, a subtle chill made its presence known along a green forest. The forest would be surrounding a nice secluded mansion on the hill above it. On a wooden stump hidden semi-deep in the woods, Allan Savory would sit there smoking a pipe as he read over a newspaper. As it was part of his daily routine to go out on his daily walk into the wilderness to read his paper. He always felt at home out in the wilderness rather than the bustle of civilization his position puts him at.\n\nHe would read about the elections fully coming under swing and more and more migrants that came in seemed to voice for the opposition. Fools, they don't have a say in anything, shouldn't. Why would their voice matter in Ephraim?\n\nHe thought as to how this might grow into a bigger problem, if he was to enact what both his party and his own environmental goals to protect this nation he needed to also protect the true Anglo's vote. Allan got up from his stump before taking his walk back to his mansion. He needed to prepare to travel around Ephraim to campaign."
 Ephraim.4.a: "The Anglo Race protected, the Trees and Environment of Ephraim saved."
 
 Ephraim.5.title: "Weird Tories, Even Weirdly Charismatic"
 Ephraim.5.desc: "Harold would walk down the street in the mid afternoon in the bustle of Manchester's streets. Everyone commutes to and from their mundane jobs, himself doing the same. Harold was a younger man still in University as he made his way back to his dorms he stumbled upon a strange sight. Two men, around Harold's age would walk around in what seemed to be in tuxedos with comically enlarged bow-ties and top hats going around talking to people.\n\nAfter sometime he would approach them as they spoke to a gathered crowd of students as they handed out flyers to all of them. They would speak in a wacky over-exaggerated tone as they spoke, saying such lines as; "We get it, Lauder's a bore and don't get me started on the tree hugging Savory. Kenny E's the one to look out for!" "Believe me, he's got a wondrous knack for this kinda thing. Prices will lower and you'll thank the guy later when he becomes the Big Cheese and is the Prime Minister himself!" Harold read through the pamphlet, the wording itself entertaining in its messaging. He had heard of the man Kenny Everette, a radio entertainer and surprisingly politically apt. Perhaps the Conservatives had an actual potential candidate to lead rather than a bunch of old-timers remembering the past"
 Ephraim.5.a: "Come on Boys, Back the Conservatives why don't ya?"
 
 Ephraim.6.title: "In the Belly of the Beast"
 Ephraim.6.desc: "Maurice sat down at a local pub, the pub became a sort of gathering ground of workers coming from their job at the factory that laid just simply a couple of blocks leftward from the pub. The pub also became a breeding ground for unionist activity. Many workers who had their drink here would be labor members, dissatisfied with the shut down of their organization and having to join the opposition they didn't even like or be branded traitors to the state. Maurice Glasman, a Conservative Party politician should be the last person they wanted to see. But suddenly when he spoke they listened.\n\nA Tory would speak of the need for open markets, Maurice talked of the workers having say over their means of production. A Tory would speak of business owners and the aristocracy being the ones with the more sensible hands to reign the state, Maurice said that the Worker ought to have an equal foot and force them into some sort of cooperation. He also spoke of a former greatness the Isles to return to. The idea of the Worker will lead the United Kingdom to a greater purpose then what any other conservative candidate could do. The workers listened and some even cheered, labor members cheering for a tory. Who would have thought, Maurice did. He thought and built together his platform of a Blue Labor bloc to run Ephraim to greatness."
 Ephraim.6.a: "Maybe some of them Tories still got sense.."
 
