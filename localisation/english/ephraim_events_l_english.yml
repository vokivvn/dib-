 EphraimOpps.1.title: "National Front Disco"
 EphraimOpps.1.desc: "In all of his life, Richard never expected to be standing outside of Number 10. Politics in Ephraim was fairly simple for a young man like him- that is, not interesting. Listening to Campbell give another dull lecture about the Ten Commandments? He was a nationalist, sure, but he needed motion, dynamism, charisma. True power. That was severely lacking in Ephraim for a very long time, which, for as long as could be remembered, was a country of old boring men. Like Campbell. Like his predecessor. What was his name? Richard couldn't remember. He wasn't that important or impressive.\n\nThat changed today. Today, Richard felt truly alive. Outside of Number 10 looked more like a rock concert than an inauguration. Bright lights illuminated the eyes of an adoring crowd, who saluted and chanted along with the man onstage. Richard and his skinhead buddies nodded, whooped, and sang along. They were transfixed by the man on stage. Steven Patrick Morrrissey, the first National Front politician ever elected into office.\n\nRichard turned away from his friends for a moment, and spotted a young woman, she looked about the same age as him, in the throng of nationalist punks. He looked at her, and smiled. She smiled back. "My name's Amelia," the woman said. "Want to dance?" Richard laughed, and the two moved to Morrissey's impeccable rhythm.\n\n"Ephraim for the English! Ephraim for the English!" Morrissey sang to the audience, who clung to his every word, as his voice rang out through loudspeakers. Richard, for the first time in a long time, if ever at all, felt like he had a country and a leader to be truly proud of. He didn't know what would come next, but this man, this Morrissey, was the future. And that future would not be anything but English. That was something to celebrate."
 EphraimOpps.1.a: "National-\nTo the national-\nTo the national front disco!"